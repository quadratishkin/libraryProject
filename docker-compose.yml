version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: smart_library_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smart_library}
      POSTGRES_USER: ${POSTGRES_USER:-smart_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smart_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: smart_library_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
